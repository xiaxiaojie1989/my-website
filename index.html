<style>
  :root {
    --bg: #080812;
    --bg2: #0e0e1c;
    --bg3: #13132a;
    --text: #e8e8f0;
    --text-dim: #8888aa;

    --purple: oklch(68% 0.20 290);
    --pink: oklch(70% 0.20 330);
    --border: rgba(255,255,255,0.07);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    overflow-x: hidden;

  ::selection { background: var(--purple); color: #fff; }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");

    top: 0; left: 0; right: 0;

    justify-content: space-between;

  .nav-logo {

    color: var(--cyan);

  .nav-links {

  .nav-links a {

  .btn-secondary {

  .exp-item:hover { background: var(--bg3); }
  .exp-meta { }
  .exp-year {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--purple);
    letter-spacing: 0.1em;
    margin-bottom: 6px;

  .exp-company {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.05em;

  .exp-role {

  /* CONTACT */
  .contact-inner {
    background: var(--bg2);
    border: 1px solid var(--border);

  .contact-inner::before {
    content: '';

  .contact-title {

    font-size: clamp(24px, 4vw, 48px);
    font-weight: 700;
    text-transform: uppercase;

  .contact-sub {

  .contact-links {

  .contact-link {

  /* FOOTER */

    border-top: 1px solid var(--border);

    justify-content: space-between;

  footer .footer-left {

    color: var(--text-dim);
    letter-spacing: 0.1em;

  .tweaks-panel {

    border: 1px solid var(--border);

  .tweaks-panel h3 {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 16px;
  }
  .tweak-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }
  .tweak-row label {

  .tweak-row select, .tweak-row input[type="range"] {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 8px;

    font-size: 11px;
    width: 100%;

  /* SCROLL ANIMATIONS */
  .fade-in {
    opacity: 0;

    transform: translateY(0);

  @media (max-width: 768px) {
    nav { padding: 16px 20px; }
    .nav-links { display: none; }
    .section { padding: 60px 20px; }
    .about-grid { grid-template-columns: 1fr; gap: 40px; }
    .skills-grid { grid-template-columns: 1fr; }
    .exp-item { grid-template-columns: 1fr; gap: 12px; }
    .contact-inner { padding: 40px 24px; }
    footer { flex-direction: column; gap: 8px; text-align: center; }
  }
</style>

<div id="root"></div>

<script type="text/babel">


const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentScheme": "cyan-purple",
  "heroSize": "large",
  "cardLayout": "grid"
}/*EDITMODE-END*/;

// Intersection observer hook for scroll animations
function useFadeIn() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {el.classList.add('visible');obs.disconnect();}
    }, { threshold: 0.1 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

const FadeIn = ({ children, delay = 0, style = {} }) => {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transitionDelay = delay + 'ms';
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {el.classList.add('visible');obs.disconnect();}
    }, { threshold: 0.08 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return <div ref={ref} className="fade-in" style={style}>{children}</div>;
};

const ImagePlaceholder = ({ label, color }) =>
<div className="card-image">

        <path d="M4 34L16 22L26 32L32 26L44 36" stroke="currentColor" strokeWidth="1.5" />
      </svg>
      <span className="card-image-label">{label}</span>
    </div>
    <div style={{
    position: 'absolute', inset: 0,
    background: `linear-gradient(135deg, ${color}08 0%, transparent 60%)`,
    pointerEvents: 'none'
  }} />
  </div>;


function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');

  const navLinks = [

  { href: '#about', en: 'About', zh: '关于我' },
  { href: '#skills', en: 'Skills', zh: '技能' },
  { href: '#contact', en: 'Contact', zh: '联系' }];


  const projects = [
  {
    color: 'cyan',
    title: 'Coca-Cola Nickname Bottles',
    titleZh: '可口可乐昵称瓶',
    tags: [
    { label: 'Brand Strategy', cls: 'tag-cyan' },
    { label: 'Viral Marketing', cls: 'tag-dim' },
    { label: 'Campaign', cls: 'tag-dim' }],

    desc: "Pioneered China's first personalized packaging campaign, turning Coke cans into viral social currency that sparked a nationwide sharing phenomenon.",
    descZh: '开创中国首个个性化包装营销活动，将可乐罐变为病毒式传播的社交货币，引爆全国话题。',
    tool: 'Social Strategy + Mass Media',
    imgLabel: 'Campaign Key Visual',
    imgSrc: 'uploads/pasted-1776578414935-0.png',
  },
  {
    color: 'purple',
    title: 'Black Pearl Restaurant Guide',
    titleZh: '黑珍珠餐厅指南',
    tags: [
    { label: 'IP Creation', cls: 'tag-purple' },
    { label: 'F&B Industry', cls: 'tag-dim' },
